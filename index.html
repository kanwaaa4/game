<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ゴキブリたたきゲーム（進化版）</title>
<style>
    body {
        text-align: center;
        font-family: sans-serif;
        margin: 0;
        color: white;

        /* 家の中っぽい背景 */
        background: linear-gradient(#cfcfcf 60%, #8b5a2b 60%);
    }

    h1 {
        margin-top: 20px;
        color: #222;
    }

    #ui {
        color: #222;
        font-weight: bold;
    }

    #game {
        display: grid;
        grid-template-columns: repeat(3, 120px);
        grid-gap: 15px;
        justify-content: center;
        margin-top: 30px;
    }

    .hole {
        width: 120px;
        height: 120px;
        background: #555;
        border-radius: 10px;
        position: relative;
        cursor: pointer;
        box-shadow: inset 0 5px 10px rgba(0,0,0,0.5);
    }

    .goki {
        position: absolute;
        width: 60px;
        height: 60px;
        top: 30px;
        left: 30px;
        display: none;
        transition: transform 0.1s;
    }

    .goki::after {
        content: "🪳";
        font-size: 40px;
    }

    .hit {
        transform: scale(0.7) rotate(20deg);
    }

    button {
        margin-top: 10px;
        padding: 10px 20px;
        font-size: 16px;
    }
</style>
</head>
<body>

<h1>ゴキブリたたきゲーム🏠</h1>

<div id="ui">
    <div id="score">スコア: 0</div>
    <div id="level">レベル: 1</div>
</div>

<button onclick="startGame()">スタート</button>

<div id="game"></div>

<script>
    const game = document.getElementById("game");
    const scoreDisplay = document.getElementById("score");
    const levelDisplay = document.getElementById("level");

    let score = 0;
    let level = 1;
    let gameInterval;
    let speed = 800;

    // マス生成
    for (let i = 0; i < 9; i++) {
        const hole = document.createElement("div");
        hole.classList.add("hole");

        const goki = document.createElement("div");
        goki.classList.add("goki");

        hole.appendChild(goki);

        hole.addEventListener("click", () => {
            if (goki.style.display === "block") {
                score++;
                scoreDisplay.textContent = "スコア: " + score;

                goki.classList.add("hit");

                setTimeout(() => {
                    goki.classList.remove("hit");
                }, 100);

                goki.style.display = "none";

                // レベルアップ（5点ごと）
                if (score % 5 === 0) {
                    level++;
                    levelDisplay.textContent = "レベル: " + level;

                    // 速さアップ（最低200msまで）
                    speed = Math.max(200, speed - 80);

                    clearInterval(gameInterval);
                    gameInterval = setInterval(randomGoki, speed);
                }
            }
        });

        game.appendChild(hole);
    }

    function randomGoki() {
        const gokis = document.querySelectorAll(".goki");
        gokis.forEach(g => g.style.display = "none");

        const index = Math.floor(Math.random() * gokis.length);
        gokis[index].style.display = "block";
    }

    function startGame() {
        score = 0;
        level = 1;
        speed = 800;

        scoreDisplay.textContent = "スコア: 0";
        levelDisplay.textContent = "レベル: 1";

        clearInterval(gameInterval);

        gameInterval = setInterval(randomGoki, speed);

        // 15秒で終了
        setTimeout(() => {
            clearInterval(gameInterval);
            alert("ゲーム終了！スコア: " + score + " / レベル: " + level);
        }, 15000);
    }
</script>

</body>
</html>
